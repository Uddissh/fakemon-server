# ============================================================
# Fakemon Chaos — Nginx Configuration
# File:  nginx/conf.d/fakemon.conf
# Repo:  fakemon-server (Uddissh)
#
# Routes:
#   api.fakemonchaos.com  → auth-server container (port 3001)
#   play.fakemonchaos.com → Showdown battle server
#
# WebSocket support is required for the Showdown battle server.
# ============================================================

# ──────────────────────────────────────────────────────────
# Redirect all HTTP → HTTPS
# ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.fakemonchaos.com play.fakemonchaos.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────────────────
# api.fakemonchaos.com → auth-server:3001
# ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.fakemonchaos.com;

    ssl_certificate     /etc/letsencrypt/live/api.fakemonchaos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fakemonchaos.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # Rate limiting on auth routes to prevent OAuth/webhook abuse.
    # Define in nginx.conf: limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req zone=api burst=10 nodelay;

    # Max upload size for sprite pipeline (100KB hard cap enforced
    # in app code, but set a generous Nginx ceiling to avoid 413s
    # before the app can return a useful error message).
    client_max_body_size 1M;

    location / {
        proxy_pass         http://auth-server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# ──────────────────────────────────────────────────────────
# play.fakemonchaos.com → Showdown battle server
# WebSocket upgrade required for the Showdown protocol.
#
# IMPORTANT: Replace SHOWDOWN_HOST below with:
#   - "showdown:8000"  if the Showdown container is on
#     the SAME Docker host and on the fakemon_net network.
#   - "TEAMMATE_SERVER_IP:8000" if the Showdown server is
#     deployed separately (e.g. teammate's own Oracle instance).
# ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name play.fakemonchaos.com;

    ssl_certificate     /etc/letsencrypt/live/play.fakemonchaos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.fakemonchaos.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    location / {
        proxy_pass          http://SHOWDOWN_HOST;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        # WebSocket connections can be long-lived during battles.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
